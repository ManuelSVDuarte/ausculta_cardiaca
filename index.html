<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulado Completo de Ausculta Cardíaca</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 900px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .screen { display: none; } .active { display: block; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; margin-top: 10px; }
        .case-box { background: #eff6ff; border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 20px; line-height: 1.6; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div id="start-screen" class="screen active">
        <h1>Simulado: 12 Casos Clínicos</h1>
        <p>Treine o raciocínio clínico integrando história, exame físico e ausculta.</p>
        <button class="btn" onclick="startQuiz()">Começar Simulado Aleatório</button>
    </div>
    <div id="game-screen" class="screen">
        <div class="case-box" id="case-text"></div>
        <button class="btn" style="background:#475569" onclick="playCurrentAudio()">Ouvir áudio 🎧</button>
        <audio id="main-audio"></audio>
        <input type="text" id="user-answer" placeholder="Digite o diagnóstico (Estenose Aortica, Regurgitacao Aortica, Regurgitacao Mitral ou Estenose Mitral)...">
        <div id="feedback" style="text-align:center; margin:10px 0; font-weight:bold;"></div>
        <button id="check-btn" class="btn" onclick="checkAnswer()">Conferir Resposta</button>
        <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Próximo Caso ➡️</button>
    </div>
</div>
<script>
    const database = [
        // Estenose Aórtica
        { name: 'Estenose Aortica', file: 'estenose_aortica.mp3', ctx: 'Antônio, 78 anos, procurou atendimento após sofrer um episódio de tontura e escurecimento visual enquanto subia um pequeno lance de escadas. Ele relata que, nos últimos dois anos, sua capacidade de realizar tarefas diárias diminuiu, sendo que agora ele sente uma dor no peito opressiva toda vez que se esforça demais. Ao exame físico, o achado mais característico é a palpação do pulso carotídeo: ele é percebido como um pulso de pequena amplitude e ascensão lenta, o pulsus parvus et tardus' },
        { name: 'Estenose Aortica', file: 'estenose_aortica.mp3', ctx: 'icardo, 38 anos, procura o ambulatório queixando-se de um cansaço que surgiu nos últimos meses, limitando suas atividades na academia. Ele nega dor precordial, mas sente que o fôlego "acaba" precocemente durante o esforço. Ao realizar o exame físico, ao colocar a palma da mão espalmada sobre a região paraesternal direita, na base do tórax, você sente uma vibração intensa e áspera, uma espécie de "ronronar" palpável que acontece no momento em que o coração se contrai.' },
        { name: 'Estenose Aortica', file: 'estenose_aortica.mp3', ctx: 'Antônio, 79 anos, relata episódios de dor no peito tipo opressiva sempre que caminha de forma mais acelerada, dor essa que cessa prontamente com o repouso. Recentemente, a família presenciou um desmaio do paciente enquanto ele subia um lance de escadas, evento que durou poucos segundos e do qual ele se recuperou espontaneamente. Ao exame físico, o que mais chama a atenção é o pulso arterial periférico: ele apresenta uma subida muito lenta e uma amplitude reduzida, parecendo "tardio" ao toque, como se demorasse a chegar sob a polpa dos seus dedos.' },
        // Regurgitação Aórtica
        { name: 'Regurgitacao Aortica', file: 'Regurgitacao_aortica.mp3', ctx: 'Beatriz, 38 anos, teve um quadro de febre prolongada e calafrios há três meses, que ela tratou parcialmente em casa. Agora, queixa-se de uma fadiga constante e, ao exame, apresenta sinais de que sua valva aórtica foi comprometida pelo processo infeccioso passado. O detalhe clínico mais importante aqui é a presença de sinais periféricos de "fuga de sangue": ao comprimir levemente o leito ungueal da paciente, nota-se o fenômeno do pulso capilar (o avermelhamento e clareamento do leito ungueal de forma rítmica).' },
        { name: 'Regurgitacao Aortica', file: 'Regurgitacao_aortica.mp3', ctx: 'Carlos, 65 anos, é um homem alto e longilíneo que tem notado, ao longo dos últimos meses, um desconforto no peito quando se deita, uma sensação de "pulsação" no pescoço e na cabeça que o incomoda ao tentar dormir. Ao examinar Carlos, observamos um fenômeno clássico: a "dança das carótidas" e o sinal de Musset (um leve movimento rítmico da cabeça sincronizado com os batimentos cardíacos). Ao verificar o pulso radial, sentimos o "pulso em martelo dágua ou pulso de Corrigan, que sobe rapidamente e colapsa com a mesma velocidade.' },
        { name: 'Regurgitacao Aortica', file: 'Regurgitacao_aortica.mp3', ctx: 'Roberto, 52 anos, hipertenso de longa data, deu entrada na emergência após sentir uma dor torácica súbita, lancinante, que descreveu como se algo tivesse "rasgado" seu peito em direção às costas. Ele está pálido, sudoreico e com extrema dificuldade de respirar. Ao exame físico, o achado mais alarmante, além da dor, é a instabilidade hemodinâmica. Nota-se uma pressão arterial divergente — por exemplo, 160/50 mmHg — onde a pressão diastólica muito baixa reflete o "vazamento" súbito de sangue da aorta de volta para o ventrículo.' },
        // Insuficiência Mitral
        { name: 'Regurgitacao Mitral', file: 'Regurgitacao_mitral.mp3', ctx: 'Eduardo, 45 anos, paciente com diagnóstico prévio de cardiomiopatia dilatada, chega ao ambulatório referindo uma dispneia que piorou nos últimos meses, surgindo agora até ao pentear o cabelo ou realizar tarefas simples de higiene pessoal. Ele relata episódios de palpitações frequentes e um ganho de peso progressivo, com inchaço persistente nos tornozelos ao final do dia. Ao exame, você nota um ictus cordis muito desviado para a esquerda e difuso' },
        { name: 'Regurgitacao Mitral', file: 'Regurgitacao_mitral.mp3', ctx: 'Juliana, 28 anos, busca atendimento devido a uma sensação de "falta de ar" intermitente e episódios de palpitações que ela descreve como "batidas fortes" no peito, que surgem especialmente quando ela está ansiosa ou sob estresse. Ela é uma mulher jovem, de biotipo longilíneo, sem doenças sistêmicas graves conhecidas. Não há edema nos membros inferiores ou sinais de congestão, mas o que chama a atenção é a queixa de uma fadiga que não condiz com sua idade. Ao realizar o exame físico, você percebe um precórdio que, apesar de não estar dilatado, apresenta uma atividade hipercinética, uma agitação precordial perceptível à palpação.' },
        { name: 'Regurgitacao Mitral', file: 'Regurgitacao_mitral.mp3', ctx: 'Ricardo, 55 anos, hipertenso de longa data, chega à unidade de emergência em um estado de aflição, relatando que, há poucas horas, sentiu uma dor súbita no peito e, desde então, não consegue se deitar para dormir por sentir que "o pulmão enche de água". Ele está pálido, com respiração curta e rápida, e apresenta um desconforto respiratório que o obriga a ficar sentado o tempo todo. Ao contrário de uma insuficiência cardíaca crônica, ele não tem edema nos pés, porque o problema aconteceu rápido demais para o corpo acumular líquido periférico.' },
        // Estenose Mitral
        { name: 'Estenose Mitral', file: 'estenose_mitral.mp3', ctx: 'Maria, 48 anos, relata um cansaço que evolui há anos, mas que piorou drasticamente após uma crise de gripe recente. Ela descreve que, ao se esforçar ou ao se emocionar, sente uma falta de ar que a obriga a parar imediatamente. O detalhe importante da sua história é a lembrança de "dores articulares que mudavam de lugar" na infância. Ao examiná-la, observa-se que, apesar da dispneia marcante, ela não apresenta os sinais periféricos de um ventrículo falho (como o ictus desviado para a esquerda). Em vez disso, o precórdio parece "calmo", mas, ao palpar o pulso, nota-se uma irregularidade rítmica frequente — um sinal de que o átrio esquerdo, estressado pela obstrução crônica, começou a fibrilar. Esse quadro de dispneia em paciente com "passado reumático" é o sinal de alerta máximo para buscar o ruflar diastólico.' },
        { name: 'Estenose Mitral', file: 'estenose_mitral.mp3', ctx: 'Ana, 26 anos, nunca teve problemas de saúde conhecidos, mas tem se queixado de tosse seca persistente e episódios de falta de ar quando pratica atividades físicas ou quando precisa subir ladeiras rapidamente. Ela nega dor no peito ou palpitações intensas, mas sua queixa de "cansaço fácil" a tem impedido de acompanhar os amigos. No exame físico, o achado que deve chamar sua atenção é a presença de uma leve cianose nas extremidades e a percepção de uma onda "a" proeminente no pulso jugular, indicando que o átrio direito está sofrendo devido à hipertensão pulmonar retrógrada causada pela barreira mitral.' },
        { name: 'Estenose Mitral', file: 'estenose_mitral.mp3', ctx: 'José, 55 anos, deu entrada no pronto-socorro após um episódio súbito de fraqueza no braço e dificuldade para falar, que regrediu em poucas horas (um evento isquêmico transitório). Ele não tem história de hipertensão ou diabetes, mas relata episódios recorrentes de cansaço aos esforços nos últimos meses. O exame físico revela que a frequência cardíaca está totalmente irregular.' }
    ];

    let currentIdx = 0;
    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
    shuffle(database); // Embaralha ao iniciar

    function startQuiz() { document.getElementById('start-screen').classList.remove('active'); document.getElementById('game-screen').classList.add('active'); showQuestion(); }
    function showQuestion() { const q = database[currentIdx]; document.getElementById('case-text').innerText = q.ctx; document.getElementById('main-audio').src = q.file; document.getElementById('check-btn').classList.remove('hidden'); document.getElementById('next-btn').classList.add('hidden'); document.getElementById('feedback').innerText = ''; document.getElementById('user-answer').value = ''; }
    function playCurrentAudio() { document.getElementById('main-audio').play(); }
    function checkAnswer() { const user = document.getElementById('user-answer').value.toLowerCase(); const correct = database[currentIdx].name.toLowerCase(); const feedback = document.getElementById('feedback'); if(user.includes(correct.split(' ')[0])) { feedback.innerText = "✅ Correto!"; feedback.style.color = "green"; } else { feedback.innerText = "❌ Incorreto. Era: " + database[currentIdx].name; feedback.style.color = "red"; } document.getElementById('check-btn').classList.add('hidden'); document.getElementById('next-btn').classList.remove('hidden'); }
    function nextQuestion() { currentIdx = (currentIdx + 1) % database.length; showQuestion(); }
</script>
</body>
</html>
